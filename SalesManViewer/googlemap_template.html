<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <style type="text/css">
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            #gmap {
                height: 100%;
            }
        </style>
        <script type="text/javascript" src="http://maps.google.com/maps/api/js?sensor=false"></script>
        <script type="text/javascript">
            function initialize() {
                window.markers = new Array();
                window.marker_data = [[MARKER_DATA]];
                // Default Kenya center
                var defaultCenter = new google.maps.LatLng(-0.0236, 37.9062);
                window.gmap = new google.maps.Map(document.getElementById('gmap'), {
                    zoom: 6,
                    center: defaultCenter,
                    mapTypeId: google.maps.MapTypeId.ROADMAP
                });
                var infowindow = new google.maps.InfoWindow();
                var bounds = new google.maps.LatLngBounds();
                var newmarker, i;                
                if (!marker_data || marker_data.length === 0 || marker_data[0].length < 2) {
                    return; // stays center on Kenya
                }
                for (i = 0; i < marker_data.length; i++) {
                    var position = new google.maps.LatLng(marker_data[i][0], marker_data[i][1]);
                    if (marker_data[0].length == 2) {
                        newmarker = new google.maps.Marker({
                            position: position,
                            map: gmap
                        });
                    } else if (marker_data[0].length == 3) {
                        newmarker = new google.maps.Marker({
                            position: position,
                            map: gmap,
                            title: marker_data[i][2]
                        });
                    } else {
                        newmarker = new google.maps.Marker({
                            position: position,
                            map: gmap,
                            title: marker_data[i][2],
                            icon: marker_data[i][3]
                        });
                    }
                    bounds.extend(position); 
                    google.maps.event.addListener(newmarker, 'click', (function (newmarker, i) {
                        return function () {
                            if (newmarker.title) {
                                infowindow.setContent(newmarker.title);
                                infowindow.open(gmap, newmarker);
                            }
                            gmap.setCenter(newmarker.getPosition());
                            // VB bridge
                            window.chrome.webview.hostObjects.bridge.showVbHelloWorld();
                            window.chrome.webview.hostObjects.bridge.getMarkerDataFromJavascript(newmarker.title, i);
                        }
                    })(newmarker, i));
                    markers[i] = newmarker;
                }
                // Auto adjust map AFTER adding markers
                if (marker_data.length === 1) {
                    gmap.setCenter(bounds.getCenter());
                    gmap.setZoom(15); // 👈 close zoom for single marker
                } else {
                    gmap.fitBounds(bounds); // 👈 multiple markers
                }
            }
            function updateMarkers(marker_data) {
                // Clear existing markers
                for (let i = 0; i < markers.length; i++) {
                    markers[i].setMap(null);
                }
                markers = [];
                var bounds = new google.maps.LatLngBounds();
                var infowindow = new google.maps.InfoWindow();
                for (let i = 0; i < marker_data.length; i++) {
                    let position = new google.maps.LatLng(marker_data[i][0], marker_data[i][1]);
                    let marker = new google.maps.Marker({
                        position: position,
                        map: gmap,
                        title: marker_data[i][2],
                        icon: marker_data[i][3]
                    });
                    bounds.extend(position);
                    google.maps.event.addListener(marker, 'click', (function (marker, i) {
                        return function () {
                            if (marker.title) {
                                infowindow.setContent(marker.title);
                                infowindow.open(gmap, marker);
                            }
                            gmap.setCenter(marker.getPosition());
                        }
                    })(marker, i));
                    markers.push(marker);
                }
                if (markers.length === 1) {
                    gmap.setCenter(bounds.getCenter());
                    gmap.setZoom(15);
                } else if (markers.length > 1) {
                    gmap.fitBounds(bounds);
                }
            }
            google.maps.event.addDomListener(window, 'load', initialize);
        </script>
    </head>
<body>
    <div id="gmap"></div>
</body>
</html>
